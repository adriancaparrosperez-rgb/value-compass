name: Sync to Hugging Face

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync GitHub repository to Hugging Face Space
        uses: huggingface/hub-sync@main
        with:
          github_repo_id: adriancaparrosperez-rgb/value-compass
          huggingface_repo_id: AdrianCP/value_compass
          repo_type: space
          hf_token: ${{ secrets.HF_TOKEN }}
